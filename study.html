<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تفاصيل الدراسة | ريم إنسايت</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="study">
  <div class="site-shell report-shell">
    <header class="topbar report-topbar">
      <a class="brand" href="index.html">
        <span class="brand-mark">ر</span>
        <span class="brand-copy">
          <strong>ريم إنسايت</strong>
          <small>منصة تحليل السوق اليمنية</small>
        </span>
      </a>
      <nav class="nav">
        <a href="index.html">الرئيسية</a>
        <a href="reports.html">التقارير</a>
        <a href="pricing.html">الباقات</a>
      </nav>
    </header>

    <main id="study-detail"></main>

    <section class="section cta">
      <div class="cta-copy">
        <span class="eyebrow">شراء مباشر</span>
        <h2>هذه الدراسة يمكن شراؤها مباشرة أو الوصول إليها عبر الباقات المميزة</h2>
        <p>النسخة الحالية استعراضية، لكن هيكل المنتج ومحتوى الدراسة مصمم ليبدو كمنتج بحثي حقيقي جاهز للبيع.</p>
      </div>
      <form class="contact-card">
        <label>
          <span>اسم الجهة</span>
          <input type="text" placeholder="شركة، مستثمر، منظمة أو جهة حكومية">
        </label>
        <label>
          <span>البريد</span>
          <input type="email" placeholder="name@example.com">
        </label>
        <label>
          <span>طريقة الوصول</span>
          <select>
            <option>شراء الدراسة مباشرة</option>
            <option>الوصول عبر ريم بلس</option>
            <option>الوصول عبر ريم برو</option>
            <option>طلب دراسة مخصصة</option>
          </select>
        </label>
        <button class="button button-primary" type="button">إرسال طلب الشراء</button>
      </form>
    </section>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
