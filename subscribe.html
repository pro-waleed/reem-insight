<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الاشتراك | ريم إنسايت</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="subscribe">
  <div class="site-shell report-shell">
    <header class="topbar report-topbar">
      <a class="brand" href="index.html">
        <span class="brand-mark">ر</span>
        <span class="brand-copy">
          <strong>ريم إنسايت</strong>
          <small>منصة تحليل السوق اليمنية</small>
        </span>
      </a>
      <nav class="nav">
        <a href="index.html">الرئيسية</a>
        <a href="pricing.html">الباقات</a>
        <a href="reports.html">التقارير</a>
      </nav>
    </header>

    <main id="subscribe-detail"></main>

    <section class="section cta">
      <div class="cta-copy">
        <span class="eyebrow">الخطوة التالية</span>
        <h2>ابدأ الاشتراك أو اطلب تواصلاً من الفريق</h2>
        <p>هذه الصفحة مهيأة للعرض الرسمي ويمكن تحويلها لاحقاً إلى تدفق اشتراك فعلي أو ربطها ببوابة دفع وCRM.</p>
      </div>
      <form class="contact-card">
        <label>
          <span>الاسم</span>
          <input type="text" placeholder="الاسم الكامل أو اسم الجهة">
        </label>
        <label>
          <span>البريد</span>
          <input type="email" placeholder="name@example.com">
        </label>
        <label>
          <span>نوع الاشتراك</span>
          <select>
            <option>ريم لايت</option>
            <option>ريم بلس</option>
            <option>ريم برو</option>
          </select>
        </label>
        <label>
          <span>ملاحظات</span>
          <textarea rows="4" placeholder="عدد المستخدمين أو نوع الجهة أو القطاع المطلوب"></textarea>
        </label>
        <button class="button button-primary" type="button">إرسال طلب الاشتراك</button>
      </form>
    </section>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
